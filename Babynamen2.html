<!DOCTYPE html>
<html lang="de">

  <meta charset="UTF-8" />

<body>
  <div class="card">
    <div class="header">
      <div class="emoji">👶🎀</div>
      <h1>Namensideen für unser Mädchen</h1>
      <p class="subtitle">
        Trage deine schönsten Vorschläge für unsere kleine Prinzessin ein.
      </p>
    </div>

    <div class="input-group">
      <label for="user">Dein Name</label>
      <input type="text" id="user" placeholder="z. B. Oma Petra" />
    </div>

    <div class="section-title">Deine Vorschläge</div>

    <div id="namesContainer"></div>

    <button id="submitButton" onclick="submitNames()">
      💖 Vorschläge absenden
    </button>

    <div id="status"></div>

    <div class="footer">
      Vielen Dank für eure liebevollen Ideen! ✨
    </div>
  </div>

  <script>
    const SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbyWgfMAu4RxMzUg1xwbJE4pQDJFb3nCw2mqMVJ-xxCo7aiTRhIjth67sMVjZb1Uqszr/exec";

    // Fünf Eingabefelder erzeugen
    const namesContainer = document.getElementById("namesContainer");
    for (let i = 1; i <= 5; i++) {
      const row = document.createElement("div");
      row.className = "name-row";
      row.innerHTML = `
        <div class="badge">${i}</div>
        <input type="text" id="name${i}" placeholder="Namensvorschlag ${i}" />
      `;
      namesContainer.appendChild(row);
    }

    function setStatus(type, message) {
      const status = document.getElementById("status");
      status.className = type;
      status.textContent = message;
    }

    async function submitNames() {
      const button = document.getElementById("submitButton");
      const user = document.getElementById("user").value.trim();

      if (!user) {
        setStatus("error", "Bitte gib deinen Namen ein.");
        return;
      }

      const names = [];
      for (let i = 1; i <= 5; i++) {
        const value = document.getElementById(`name${i}`).value.trim();
        if (value) names.push(value);
      }

      if (names.length === 0) {
        setStatus("error", "Bitte gib mindestens einen Namensvorschlag ein.");
        return;
      }

      button.disabled = true;
      setStatus("loading", "Speichere Vorschläge...");

      let success = 0;
      let failed = 0;

      for (const name of names) {
        const url = `${SCRIPT_URL}?name=${encodeURIComponent(name)}&user=${encodeURIComponent(user)}`;

        try {
          const response = await fetch(url);
          if (response.ok) {
            success++;
          } else {
            failed++;
          }
        } catch (error) {
          failed++;
        }
      }

      button.disabled = false;

      if (failed === 0) {
        setStatus(
          "success",
          `💖 Vielen Dank! ${success} Vorschlag${success > 1 ? "e" : ""} wurden gespeichert.`
        );

        // Felder leeren (Name behalten)
        for (let i = 1; i <= 5; i++) {
          document.getElementById(`name${i}`).value = "";
        }
      } else {
        setStatus(
          "error",
          `${success} erfolgreich gespeichert, ${failed} fehlgeschlagen.`
        );
      }
    }
  </script>
</body>
</html>
